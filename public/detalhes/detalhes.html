<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wanderlust — Detalhes</title>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <header>
    <a href="../home/index.html"><div class="logo">Wander<span>lust</span></div></a>
    <div class="header-right">
      <span class="greeting">Olá, <strong>Usuário</strong> 👋</span>
      <a href="../home/index.html" class="btn-map">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Voltar
      </a>
    </div>
  </header>

  <div id="detalhe-container">
    <div class="detail-loading" id="detalhe-status">Carregando destino...</div>
  </div>

  <div class="modal-overlay" id="modal-editar-ponto">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Editar Ponto Turístico</h2>
        <button class="modal-close" id="btn-fechar-modal-editar">&times;</button>
      </div>
      <form id="form-editar-ponto">
        <div class="field">
          <label>Nome</label>
          <input type="text" id="edit-nome" placeholder="Ex: Torre Eiffel"/>
        </div>

        <div class="form-row">
          <div class="field">
            <label>Cidade</label>
            <input type="text" id="edit-cidade" placeholder="Ex: Paris"/>
          </div>
          <div class="field">
            <label>País</label>
            <input type="text" id="edit-pais" placeholder="Ex: França"/>
          </div>
        </div>

        <div class="form-row">
          <div class="field">
            <label>Continente</label>
            <select id="edit-continente">
              <option value="">Selecione...</option>
              <option>África</option>
              <option>América do Norte</option>
              <option>América do Sul</option>
              <option>Ásia</option>
              <option>Europa</option>
              <option>Oceania</option>
            </select>
          </div>
          <div class="field">
            <label>Categoria</label>
            <select id="edit-categoria">
              <option value="">Selecione...</option>
              <option>Monumento</option>
              <option>Sítio Histórico</option>
              <option>Templo</option>
              <option>Igreja</option>
              <option>Palácio</option>
              <option>Natureza</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Descrição</label>
          <textarea id="edit-descricao" placeholder="Descreva o ponto turístico..."></textarea>
        </div>

        <div class="form-row">
          <div class="field">
            <label>Avaliação (0 a 5)</label>
            <input type="number" id="edit-avaliacao" min="0" max="5" step="0.1" placeholder="Ex: 4.8"/>
          </div>
          <div class="field">
            <label>URL da Imagem</label>
            <input type="text" id="edit-imagem" placeholder="https://..."/>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-cancelar" id="btn-cancelar-editar">Cancelar</button>
          <button type="submit" class="btn-salvar">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="detalhes.js"></script>
</body>
</html>
